<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="rgba(34, 197, 94, 0.1)" stroke="url(#iceGrad)" stroke-width="2"/>
  <!-- Ice cubes -->
  <rect x="35" y="40" width="12" height="12" rx="2" fill="none" stroke="url(#iceGrad)" stroke-width="2" opacity="0.7"/>
  <rect x="52" y="38" width="12" height="12" rx="2" fill="none" stroke="url(#iceGrad)" stroke-width="2" opacity="0.7"/>
  <rect x="43" y="52" width="12" height="12" rx="2" fill="none" stroke="url(#iceGrad)" stroke-width="2" opacity="0.7"/>
  <!-- Sparkle effect -->
  <line x1="40" y1="46" x2="42" y2="46" stroke="url(#iceGrad)" stroke-width="1.5"/>
  <line x1="41" y1="45" x2="41" y2="47" stroke="url(#iceGrad)" stroke-width="1.5"/>
  <line x1="57" y1="44" x2="59" y2="44" stroke="url(#iceGrad)" stroke-width="1.5"/>
  <line x1="58" y1="43" x2="58" y2="45" stroke="url(#iceGrad)" stroke-width="1.5"/>
</svg>
