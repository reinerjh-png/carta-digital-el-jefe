<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="beerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4CF57"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="rgba(212, 175, 55, 0.1)" stroke="url(#beerGrad)" stroke-width="2"/>
  <!-- Beer bottle -->
  <rect x="42" y="25" width="16" height="50" rx="2" fill="none" stroke="url(#beerGrad)" stroke-width="2"/>
  <!-- Neck -->
  <rect x="45" y="20" width="10" height="8" rx="1" fill="none" stroke="url(#beerGrad)" stroke-width="2"/>
  <!-- Cap -->
  <rect x="44" y="18" width="12" height="4" rx="1" fill="url(#beerGrad)" opacity="0.7"/>
  <!-- Label -->
  <rect x="44" y="40" width="12" height="15" rx="1" fill="url(#beerGrad)" opacity="0.3"/>
  <!-- Shine -->
  <line x1="45" y1="35" x2="45" y2="60" stroke="url(#beerGrad)" stroke-width="1" opacity="0.5"/>
</svg>
