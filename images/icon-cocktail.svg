      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="rgba(34, 197, 94, 0.1)" stroke="url(#cocktailGrad)" stroke-width="2"/>
