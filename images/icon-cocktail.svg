  <line x1="50" y1="70" x2="50" y2="80" stroke="url(#cocktailGrad)" stroke-width="3"/>
  <line x1="42" y1="80" x2="58" y2="80" stroke="url(#cocktailGrad)" stroke-width="2"/>
  <!-- Liquid -->
  <path d="M38 42 L62 42 L50 65 Z" fill="url(#cocktailGrad)" opacity="0.5"/>
