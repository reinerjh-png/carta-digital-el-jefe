<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="comboGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="rgba(34, 197, 94, 0.1)" stroke="url(#comboGrad)" stroke-width="2"/>
  
  <!-- Bowl base -->
  <path d="M35 70 Q35 90 60 90 Q85 90 85 70" fill="none" stroke="url(#comboGrad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Bowl content -->
  <ellipse cx="60" cy="65" rx="25" ry="8" fill="rgba(34, 197, 94, 0.3)"/>
  
  <!-- Chopsticks -->
  <line x1="75" y1="50" x2="95" y2="30" stroke="url(#comboGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="52" x2="98" y2="35" stroke="url(#comboGrad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Steam lines -->
  <path d="M50 45 Q55 35 50 25" stroke="url(#comboGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M60 42 Q65 32 60 22" stroke="url(#comboGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M70 45 Q75 35 70 25" stroke="url(#comboGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Glow effect -->
  <circle cx="60" cy="60" r="50" fill="url(#comboGrad)" opacity="0.1" filter="url(#glow)"/>
</svg>
