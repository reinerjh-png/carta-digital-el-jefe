<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sodaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#4ADE80"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="rgba(34, 197, 94, 0.1)" stroke="url(#sodaGrad)" stroke-width="2"/>
  <!-- Can/Bottle shape -->
  <rect x="38" y="30" width="24" height="45" rx="3" fill="none" stroke="url(#sodaGrad)" stroke-width="2"/>
  <!-- Cap -->
  <rect x="40" y="28" width="20" height="4" rx="1" fill="url(#sodaGrad)" opacity="0.6"/>
  <!-- Label area -->
  <rect x="40" y="45" width="20" height="15" rx="1" fill="url(#sodaGrad)" opacity="0.3"/>
  <!-- Bubbles -->
  <circle cx="44" cy="55" r="1.5" fill="url(#sodaGrad)" opacity="0.5"/>
  <circle cx="52" cy="60" r="1" fill="url(#sodaGrad)" opacity="0.5"/>
  <circle cx="48" cy="65" r="1.5" fill="url(#sodaGrad)" opacity="0.5"/>
</svg>
