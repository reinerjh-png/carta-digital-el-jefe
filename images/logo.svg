<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A34A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="150" fill="#0a0a0a" rx="10"/>
  
  <!-- Decorative leaves -->
  <ellipse cx="30" cy="75" rx="20" ry="40" fill="#22C55E" opacity="0.3" transform="rotate(-30 30 75)"/>
  <ellipse cx="370" cy="75" rx="20" ry="40" fill="#22C55E" opacity="0.3" transform="rotate(30 370 75)"/>
  
  <!-- Main text - EL JEFE -->
  <text x="200" y="70" 
        font-family="Georgia, serif" 
        font-size="42" 
        font-weight="700"
        fill="url(#neonGradient)"
        text-anchor="middle"
        filter="url(#glow)"
        letter-spacing="8">
    EL JEFE
  </text>
  
  <!-- Subtitle - LOUNGE -->
  <text x="200" y="105" 
        font-family="Arial, sans-serif" 
        font-size="14" 
        font-weight="400"
        fill="url(#goldGradient)"
        text-anchor="middle"
        letter-spacing="12">
    LOUNGE
  </text>
  
  <!-- Decorative line -->
  <line x1="100" y1="125" x2="300" y2="125" stroke="url(#goldGradient)" stroke-width="1" opacity="0.5"/>
  
  <!-- Amazon leaf accent -->
  <path d="M190 135 Q200 145 210 135" stroke="#22C55E" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
