<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="meatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8941F"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="rgba(212, 175, 55, 0.1)" stroke="url(#meatGrad)" stroke-width="2"/>
  <!-- Meat piece -->
  <rect x="35" y="40" width="30" height="25" rx="5" fill="url(#meatGrad)" opacity="0.7"/>
  <!-- Grill marks -->
  <line x1="40" y1="45" x2="60" y2="45" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
  <line x1="40" y1="52" x2="60" y2="52" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
  <line x1="40" y1="59" x2="60" y2="59" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
  <!-- Vegetables -->
  <circle cx="70" cy="45" r="4" fill="url(#meatGrad)" opacity="0.6"/>
  <circle cx="75" cy="55" r="4" fill="url(#meatGrad)" opacity="0.6"/>
  <circle cx="68" cy="62" r="4" fill="url(#meatGrad)" opacity="0.6"/>
</svg>
