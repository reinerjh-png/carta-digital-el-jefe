<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="piqueosGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="rgba(34, 197, 94, 0.1)" stroke="url(#piqueosGrad)" stroke-width="2"/>
  
  <!-- Plate -->
  <ellipse cx="60" cy="70" rx="35" ry="10" fill="none" stroke="url(#piqueosGrad)" stroke-width="2"/>
  
  <!-- Skewer stick -->
  <line x1="35" y1="65" x2="85" y2="65" stroke="url(#piqueosGrad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Food pieces on skewer -->
  <circle cx="45" cy="65" r="6" fill="url(#piqueosGrad)" opacity="0.7"/>
  <circle cx="60" cy="65" r="6" fill="url(#piqueosGrad)" opacity="0.7"/>
  <circle cx="75" cy="65" r="6" fill="url(#piqueosGrad)" opacity="0.7"/>
  
  <!-- Additional food pieces below -->
  <circle cx="50" cy="78" r="5" fill="url(#piqueosGrad)" opacity="0.5"/>
  <circle cx="65" cy="80" r="5" fill="url(#piqueosGrad)" opacity="0.5"/>
  <circle cx="70" cy="75" r="4" fill="url(#piqueosGrad)" opacity="0.5"/>
  
  <!-- Steam -->
  <path d="M48 50 Q53 40 48 30" stroke="url(#piqueosGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M60 48 Q65 38 60 28" stroke="url(#piqueosGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M72 50 Q77 40 72 30" stroke="url(#piqueosGrad)" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Glow -->
  <circle cx="60" cy="60" r="50" fill="url(#piqueosGrad)" opacity="0.1" filter="url(#glow)"/>
</svg>
