<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bebidasGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#4ADE80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="rgba(34, 197, 94, 0.1)" stroke="url(#bebidasGrad)" stroke-width="2"/>
  
  <!-- Glass -->
  <path d="M45 40 L45 85 Q45 95 60 95 Q75 95 75 85 L75 40" fill="none" stroke="url(#bebidasGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Liquid -->
  <path d="M48 55 L48 82 Q48 90 60 90 Q72 90 72 82 L72 55" fill="url(#bebidasGrad)" opacity="0.4"/>
  
  <!-- Liquid surface -->
  <ellipse cx="60" cy="55" rx="12" ry="4" fill="url(#bebidasGrad)" opacity="0.6"/>
  
  <!-- Straw -->
  <line x1="60" y1="55" x2="60" y2="30" stroke="url(#bebidasGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="30" x2="70" y2="25" stroke="url(#bebidasGrad)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Lemon slice -->
  <path d="M75 50 Q80 55 75 60" stroke="url(#bebidasGrad)" stroke-width="2" fill="none"/>
  <line x1="75" y1="50" x2="78" y2="55" stroke="url(#bebidasGrad)" stroke-width="1"/>
  <line x1="75" y1="55" x2="79" y2="55" stroke="url(#bebidasGrad)" stroke-width="1"/>
  <line x1="75" y1="60" x2="78" y2="55" stroke="url(#bebidasGrad)" stroke-width="1"/>
  
  <!-- Bubbles -->
  <circle cx="52" cy="70" r="2" fill="url(#bebidasGrad)" opacity="0.6"/>
  <circle cx="68" cy="75" r="1.5" fill="url(#bebidasGrad)" opacity="0.6"/>
  <circle cx="55" cy="80" r="1" fill="url(#bebidasGrad)" opacity="0.6"/>
  
  <!-- Glow -->
  <circle cx="60" cy="60" r="50" fill="url(#bebidasGrad)" opacity="0.1" filter="url(#glow)"/>
</svg>
